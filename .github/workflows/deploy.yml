name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build
      run: |
        go mod download
        go build -o UsagiProblemList .
    
    - name: Deploy to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "UsagiProblemList"
        target: "/root/cfProblemList"
        strip_components: 0
    
    - name: Restart Service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/cfProblemList
          chmod +x UsagiProblemList
          if [ -f ./manage.sh ]; then
            ./manage.sh restart
          else
            pkill -f UsagiProblemList || true
            nohup ./UsagiProblemList > /dev/null 2>&1 &
          fi
          echo 'Deployment completed!'
